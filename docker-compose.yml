version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=super-secret-key-blueprint-ai-1234567890-abcdef
      - DATABASE_URL=sqlite:///./blueprint_ai.db
      - CORS_ORIGINS=*
    volumes:
      - ./backend:/app
      - backend-db:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-db:
